services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag}
      POSTGRES_DB: ${POSTGRES_DB:-ragdb}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - rag_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rag} -d ${POSTGRES_DB:-ragdb}"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-rag}:${POSTGRES_PASSWORD:-rag}@db:5432/${POSTGRES_DB:-ragdb}
      APP_ENV: ${APP_ENV:-prod}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai_compat}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      LLM_PROFILES_JSON: '${LLM_PROFILES_JSON:-}'
      SYSTEM_PERSONA_PATH: ${SYSTEM_PERSONA_PATH:-}
      ANSWER_TEMPLATE_PATH: ${ANSWER_TEMPLATE_PATH:-}
      RAG_CASES_PATH: ${RAG_CASES_PATH:-config/rag_cases.yml}
      INSTANCE_CASE_IDS_JSON: '${INSTANCE_CASE_IDS_JSON:-}'
      QUERY_ROUTER_ENABLED: ${QUERY_ROUTER_ENABLED:-true}
      QUERY_ROUTER_DOCS_SOURCE_TYPES_JSON: '${QUERY_ROUTER_DOCS_SOURCE_TYPES_JSON:-["universe_status","universe_tools","universe_argumentation"]}'
      QUERY_ROUTER_PROMPTS_SOURCE_TYPES_JSON: '${QUERY_ROUTER_PROMPTS_SOURCE_TYPES_JSON:-["universe_prompts"]}'
      QUERY_ROUTER_DOCS_KEYWORDS_JSON: '${QUERY_ROUTER_DOCS_KEYWORDS_JSON:-["status","simulering","simulation","graf","graph","parameter","trajectory","ctmc","ssa","hypotese","observabel","metastabilitet","lorentz","energi"]}'
      QUERY_ROUTER_PROMPTS_KEYWORDS_JSON: '${QUERY_ROUTER_PROMPTS_KEYWORDS_JSON:-["prompt","prompts","system prompt","persona","template","mal","instruksjon","instruction","language model","llm"]}'
      TOP_K_VECTOR: ${TOP_K_VECTOR:-50}
      TOP_K_LEXICAL: ${TOP_K_LEXICAL:-50}
      TOP_K_FINAL: ${TOP_K_FINAL:-12}
      MAX_CHUNKS_PER_DOC: ${MAX_CHUNKS_PER_DOC:-3}
      QUERY_REWRITE_ENABLED: ${QUERY_REWRITE_ENABLED:-true}
      RERANKER_ENABLED: ${RERANKER_ENABLED:-false}
      RERANKER_MODEL: ${RERANKER_MODEL:-cross-encoder/ms-marco-MiniLM-L-6-v2}
      GROUNDING_MIN_CITATIONS: ${GROUNDING_MIN_CITATIONS:-2}
      STREAM_CHUNK_CHARS: ${STREAM_CHUNK_CHARS:-80}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-}
      INGEST_ROOT: ${INGEST_ROOT:-/data/uploads}
      RESEARCH_API_TOKENS_JSON: '${RESEARCH_API_TOKENS_JSON:-}'
      RESEARCH_DOWNLOAD_SIGNING_KEY: ${RESEARCH_DOWNLOAD_SIGNING_KEY:-}
      RESEARCH_DOWNLOAD_TTL_SECONDS: ${RESEARCH_DOWNLOAD_TTL_SECONDS:-300}
      CELL_ACCESS_CONTROL_ENABLED: ${CELL_ACCESS_CONTROL_ENABLED:-false}
      CELL_GATEWAY_SHARED_SECRET: ${CELL_GATEWAY_SHARED_SECRET:-}
      CELL_OWNER_USER_IDS_JSON: '${CELL_OWNER_USER_IDS_JSON:-[]}'
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ../uploads:/data/uploads
    command:
      - /bin/sh
      - -c
      - python -m scripts.rebuild_index && uvicorn app.main:app --host 0.0.0.0 --port 8000

volumes:
  rag_pgdata:
